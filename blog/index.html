<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — Vyas Giridharan</title>
  <meta name="description" content="Notes on systems, hardware, and the work.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="wrap">

    <nav>
      <a href="/">Home</a>
      <a href="/#experience">Experience</a>
      <a href="/#projects">Projects</a>
      <a href="/resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a>
    </nav>

    <header class="blog-hero">
      <h1>Blog</h1>
      <p class="blog-tagline">Notes on systems, hardware, and the work.</p>
    </header>

    <main>
      <section class="blog-list" id="blog-list" aria-busy="true">
        <p class="blog-loading">Loading…</p>
      </section>
    </main>

    <footer>
      <p>Chennai, India</p>
    </footer>

  </div>

  <script>
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    function pad2(n) { return String(n).padStart(2, '0'); }

    function formatShortDate(iso) {
      const [, m, d] = iso.split('-').map(Number);
      return `${MONTHS[m - 1]} ${pad2(d)}`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function groupByYear(posts) {
      const byYear = new Map();
      for (const p of posts) {
        const year = p.date.slice(0, 4);
        if (!byYear.has(year)) byYear.set(year, []);
        byYear.get(year).push(p);
      }
      return [...byYear.entries()]
        .sort(([a], [b]) => b.localeCompare(a))
        .map(([year, ps]) => [
          year,
          ps.sort((a, b) => b.date.localeCompare(a.date))
        ]);
    }

    function render(posts) {
      const root = document.getElementById('blog-list');
      root.removeAttribute('aria-busy');
      if (!posts.length) {
        root.innerHTML = '<p class="blog-empty">No posts yet.</p>';
        return;
      }

      const groups = groupByYear(posts);
      root.innerHTML = groups.map(([year, ps]) => `
        <div class="blog-year-group">
          <h2 class="blog-year">${esc(year)}</h2>
          <ul class="blog-rows">
            ${ps.map(p => `
              <li class="blog-post-row">
                <a href="post.html?slug=${encodeURIComponent(p.slug)}">
                  <span class="blog-row-date">${esc(formatShortDate(p.date))}</span>
                  <div class="blog-row-body">
                    <span class="blog-row-title">${esc(p.title)}</span>
                    <span class="blog-row-desc">${esc(p.description || '')}</span>
                  </div>
                </a>
              </li>
            `).join('')}
          </ul>
        </div>
      `).join('');
    }

    fetch('posts/manifest.json')
      .then(r => {
        if (!r.ok) throw new Error('manifest fetch failed: ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(err => {
        const root = document.getElementById('blog-list');
        root.removeAttribute('aria-busy');
        root.innerHTML = `<p class="blog-empty">Failed to load posts. ${esc(err.message)}</p>`;
      });
  </script>
</body>
</html>
